<div class="panda-layout">

  <!-- PART A — Student Info (Q6: moving up/down) -->
  <aside class="part-a">
    <div class="student-card bounce-updown">
      <div class="student-avatar">
        <img src="assets/images/avatar.png.jpg" alt="Student Avatar"
          onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=NTT&background=c9873e&color=fff&size=80&bold=true'" />
      </div>
      <div class="student-info">
        <span class="student-id">K234111448</span>
        <span class="student-name">Nguyen Thanh Thanh</span>
        <span class="student-class">Class: K234112E</span>
      </div>
    </div>
  </aside>

  <!-- PART B — Navigation Menu -->
  <header class="part-b">
    <div class="brand">
      <span class="brand-icon">🐼</span>
      <span class="brand-name">Panda Store</span>
    </div>

    <nav class="main-nav">
      <!-- Shopping -->
      <div class="nav-item">
        <a routerLink="/shopping" class="nav-link">🛍️ Shopping</a>
      </div>

      <!-- Cart dropdown -->
      <div class="nav-item has-dropdown">
        <a routerLink="#" class="nav-link">
          🛒 Cart
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>
        <ul class="dropdown">
          <li><a routerLink="/current-cart" class="drop-link">Current Cart</a></li>
          <li><a routerLink="/revenue" class="drop-link">Revenue Statistics</a></li>
          <li><a routerLink="/vip-customers" class="drop-link">VIP Customers</a></li>
        </ul>
      </div>
    </nav>

    <!-- Welcome / Login -->
    <div class="nav-auth">
      <span *ngIf="isLoggedIn" class="welcome-text">
        Welcome
        <a href="javascript:void(0)" (click)="logout()" class="btn-logout">
          {{ currentUser?.name || currentUser?.username }} (Logout)
        </a>
      </span>
      <a *ngIf="!isLoggedIn" routerLink="/login" class="btn-login">Login</a>
    </div>
  </header>

  <!-- PART C — Router Outlet -->
  <main class="part-c">
    <router-outlet></router-outlet>
  </main>

</div>
