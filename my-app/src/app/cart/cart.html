<div class="cart-container">
  <h2>🛒 Current Cart</h2>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="alert alert-error">
    {{ errorMessage }}
  </div>

  <!-- Empty Cart -->
  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <p>Your cart is empty</p>
    <button (click)="addMoreProducts()" class="btn btn-primary">Continue Shopping</button>
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0" class="cart-content">
    <table class="cart-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems" class="cart-item">
          <td class="product-name">
            <img [src]="item.image" [alt]="item.name" class="item-image"
              onerror="this.src='https://via.placeholder.com/50?text=No+Image'" />
            <span>{{ item.name }}</span>
          </td>
          <td class="product-price">${{ item.price }}</td>
          <td class="product-quantity">
            <input 
              type="number" 
              min="1" 
              [value]="item.quantity"
              (change)="updateCartItem(item._id, $any($event.target).value)"
              class="qty-input"
            />
          </td>
          <td class="product-subtotal">${{ item.price * item.quantity }}</td>
          <td class="product-remove">
            <button (click)="removeFromCart(item._id)" class="btn btn-danger">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Cart Summary -->
    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span>${{ totalAmount }}</span>
      </div>
      <div class="summary-row">
        <span>Tax (0%):</span>
        <span>$0</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span>${{ totalAmount }}</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="cart-actions">
      <button (click)="addMoreProducts()" class="btn btn-secondary">
        Continue Shopping
      </button>
      <button 
        (click)="checkout()" 
        [disabled]="loading"
        class="btn btn-checkout"
      >
        {{ loading ? 'Processing...' : '💳 Proceed to Payment' }}
      </button>
    </div>
  </div>
</div>
